spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/local}
spring.datasource.username=${DB_USER:usuario_generico}
spring.datasource.password=${DB_PASSWORD:password_generico}

# 1. Cambia 'create' por 'create-drop' o déjalo en 'create' si quieres que borre y meta los datos de data.sql en cada reinicio
spring.jpa.hibernate.ddl-auto=create

spring.jpa.show-sql=true

# 2. ESTO ES CRUCIAL: Le dice a Spring que ejecute data.sql DESPUÉS de que Hibernate cree las tablas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always